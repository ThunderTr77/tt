<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời Khóa Biểu - Tech Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: #000;
            color: #0f0;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Matrix Rain Background */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        /* Particle Connection Canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Futuristic Header */
        header {
            text-align: center;
            margin-bottom: 50px;
            animation: glitchIn 1s ease-out;
        }

        @keyframes glitchIn {
            0% {
                opacity: 0;
                transform: scale(1.2) translateY(-50px);
                filter: blur(10px);
            }
            20% {
                transform: scale(0.9) translateY(-20px) skew(-5deg);
            }
            40% {
                transform: scale(1.1) translateY(-10px) skew(5deg);
            }
            60% {
                transform: scale(0.95) translateY(-5px) skew(-2deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0) skew(0);
                filter: blur(0);
            }
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 8px;
            position: relative;
            display: inline-block;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff,
                0 0 80px #00ffff,
                0 0 120px #00ffff;
            animation: neonPulse 2s ease-in-out infinite alternate;
        }

        @keyframes neonPulse {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 40px #00ffff,
                    0 0 80px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 40px #00ffff,
                    0 0 80px #00ffff,
                    0 0 120px #00ffff,
                    0 0 160px #00ffff;
            }
        }

        .subtitle {
            font-size: 1.4rem;
            color: #0ff;
            font-weight: 300;
            letter-spacing: 4px;
            margin-top: 15px;
            opacity: 0;
            animation: typeIn 2s steps(20) 0.5s forwards;
        }

        @keyframes typeIn {
            to {
                opacity: 1;
            }
        }

        /* Scan Line Effect */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent,
                rgba(0, 255, 255, 0.8),
                transparent);
            box-shadow: 0 0 10px #0ff;
            animation: scan 3s linear infinite;
            z-index: 1000;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
            }
            100% {
                top: 100%;
            }
        }

        /* Timetable Container */
        .timetable-wrapper {
            background: rgba(0, 20, 20, 0.8);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 
                0 0 50px rgba(0, 255, 255, 0.3),
                inset 0 0 50px rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            position: relative;
            overflow: hidden;
        }

        .timetable-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent,
                rgba(0, 255, 255, 0.3),
                transparent 30%
            );
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        .timetable-wrapper::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: rgba(0, 10, 10, 0.9);
            border-radius: 18px;
        }

        .timetable {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            gap: 2px;
        }

        /* Header Styles */
        .header-cell {
            background: linear-gradient(135deg, #001a1a, #003333);
            padding: 20px 10px;
            text-align: center;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #0ff;
            border: 1px solid #0ff;
            position: relative;
            overflow: hidden;
        }

        .header-cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .header-cell:hover::before {
            width: 200%;
            height: 200%;
        }

        .header-cell span {
            position: relative;
            z-index: 1;
        }

        /* Time Cell */
        .time-cell {
            background: rgba(0, 50, 50, 0.6);
            padding: 15px 10px;
            text-align: center;
            font-weight: 700;
            color: #0ff;
            border: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 10px #0ff;
        }

        /* Empty Cell */
        .cell-empty {
            background: rgba(0, 20, 20, 0.3);
            min-height: 80px;
            border: 1px solid rgba(0, 255, 255, 0.1);
            position: relative;
        }

        .cell-empty:hover {
            background: rgba(0, 255, 255, 0.05);
            border-color: rgba(0, 255, 255, 0.3);
        }

        /* Subject Cell */
        .subject-cell {
            background: linear-gradient(135deg, 
                rgba(0, 100, 100, 0.4), 
                rgba(0, 50, 80, 0.4));
            padding: 15px;
            border: 2px solid #0ff;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .subject-cell::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(0, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            transition: all 0.5s;
        }

        .subject-cell:hover::before {
            left: 100%;
        }

        .subject-cell:hover {
            transform: scale(1.05);
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.6),
                inset 0 0 20px rgba(0, 255, 255, 0.2);
            border-color: #0ff;
            z-index: 10;
        }

        .subject-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: #fff;
            margin-bottom: 8px;
            text-shadow: 0 0 5px #0ff;
            position: relative;
            z-index: 1;
        }

        .subject-code {
            font-size: 0.75rem;
            color: #0ff;
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 5px;
            border: 1px solid #0ff;
            position: relative;
            z-index: 1;
        }

        .subject-room {
            font-size: 0.7rem;
            color: #aaa;
            position: relative;
            z-index: 1;
        }

        .subject-type {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 2;
            box-shadow: 0 0 10px currentColor;
        }

        .type-LT {
            background: #0ff;
            color: #000;
            animation: blinkLT 2s infinite;
        }

        .type-TH {
            background: #f0f;
            color: #000;
            animation: blinkTH 2s infinite;
        }

        @keyframes blinkLT {
            0%, 100% { box-shadow: 0 0 10px #0ff; }
            50% { box-shadow: 0 0 20px #0ff, 0 0 30px #0ff; }
        }

        @keyframes blinkTH {
            0%, 100% { box-shadow: 0 0 10px #f0f; }
            50% { box-shadow: 0 0 20px #f0f, 0 0 30px #f0f; }
        }

        /* Corner Decorations */
        .corner-decoration {
            position: fixed;
            width: 100px;
            height: 100px;
            border: 2px solid #0ff;
            z-index: 999;
            pointer-events: none;
        }

        .corner-tl {
            top: 10px;
            left: 10px;
            border-right: none;
            border-bottom: none;
            box-shadow: -5px -5px 10px rgba(0, 255, 255, 0.5);
        }

        .corner-tr {
            top: 10px;
            right: 10px;
            border-left: none;
            border-bottom: none;
            box-shadow: 5px -5px 10px rgba(0, 255, 255, 0.5);
        }

        .corner-bl {
            bottom: 10px;
            left: 10px;
            border-right: none;
            border-top: none;
            box-shadow: -5px 5px 10px rgba(0, 255, 255, 0.5);
        }

        .corner-br {
            bottom: 10px;
            right: 10px;
            border-left: none;
            border-top: none;
            box-shadow: 5px 5px 10px rgba(0, 255, 255, 0.5);
        }

        /* Loading Bar */
        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(0, 255, 255, 0.2);
            z-index: 1001;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, 
                transparent,
                #0ff,
                transparent);
            box-shadow: 0 0 10px #0ff;
            animation: loading 2s ease-in-out forwards;
        }

        @keyframes loading {
            0% { width: 0; }
            100% { width: 100%; }
        }

        /* Responsive */
        @media (max-width: 1400px) {
            .timetable {
                grid-template-columns: 70px repeat(7, 1fr);
            }
            h1 { font-size: 3rem; }
        }

        @media (max-width: 1024px) {
            .timetable-wrapper {
                overflow-x: auto;
            }
            .timetable {
                min-width: 1000px;
            }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <!-- Matrix Background -->
    <canvas id="matrix-canvas"></canvas>
    
    <!-- Particle Connections -->
    <canvas id="particle-canvas"></canvas>

    <!-- Scan Line -->
    <div class="scan-line"></div>

    <!-- Loading Bar -->
    <div class="loading-bar">
        <div class="loading-progress"></div>
    </div>

    <!-- Corner Decorations -->
    <div class="corner-decoration corner-tl"></div>
    <div class="corner-decoration corner-tr"></div>
    <div class="corner-decoration corner-bl"></div>
    <div class="corner-decoration corner-br"></div>

    <div class="container">
        <header>
            <h1>THỜI KHÓA BIỂU</h1>
            <p class="subtitle">HỌC KỲ 2 - 2026</p>
        </header>

        <div class="timetable-wrapper">
            <div id="timetable" class="timetable"></div>
        </div>
    </div>

    <script>

        const SCHEDULE_DATA = {
        
            subjects: {
                'BAA0021': {
                    name: 'Thể dục 1',
                    room: 'P.cs2:KHTN2',
                    type: 'LT'
                },
                'BAA0101': {
                    name: 'Triết học Mác - Lênin',
                    room: 'P.cs2:E308',
                    type: 'LT'
                },
                'BAA0102': {
                    name: 'Kinh tế chính trị Mác - Lênin',
                    room: 'P.cs2:ThongBaoSau',
                    type: 'LT'
                },
                'EDT0001': {
                    name: 'Nhập môn ngành CNTT',
                    room: 'P.cs2:E306',
                    type: 'LT'
                },
                'MTH0021': {
                    name: 'Vi tích phân 1',
                    room: 'P.cs2:NDH7.6',
                    type: 'LT'
                },
                'MTH0021_TH': {
                    name: 'Vi tích phân 1 (TH)',
                    room: 'P.cs2:PMT_NDH4.2',
                    type: 'TH'
                },
                'MTH0035': {
                    name: 'Đại số tuyến tính',
                    room: 'P.cs2:E306',
                    type: 'LT'
                },
                'MTH0035_TH': {
                    name: 'Đại số tuyến tính (TH)',
                    room: 'P.cs2:PMT_NDH4.4',
                    type: 'TH'
                },
                'PHY0001': {
                    name: 'Vật lý đại cương 1',
                    room: 'P.cs2:E107',
                    type: 'LT'
                }, //ki 2
                'BAA0022': {
                    name: 'Thể dục 2',
                    room: 'P.cs2:KHTN2',
                    type: 'LT'
                },
                'BAA00103': {
                    name: 'Chủ nghĩa xã hội khoa học',
                    room: 'P.cs2:E106',
                    type: 'LT'
                },
                'EDT10001': {
                    name: 'Nhập môn Khoa học giáo dục',
                    room: 'P.cs2:E208',
                    type: 'LT'
                },
                'EDT10008': {
                    name: 'Phương pháp lập trình hướng đối tượng 1',
                    room: 'P.cs2:F206',
                    type: 'LT'
                },
                'EDT10008_TH': {
                    name: 'Phương pháp lập trình hướng đối tượng 1',
                    room: 'P.cs2:NDH4.1',
                    type: 'TH'
                },
                'MTH00022': {
                    name: 'Vi tích phân 2',
                    room: 'P.cs2:D212',
                    type: 'LT'
                },
                'MTH00022_TH': {
                    name: 'Vi tích phân 2',
                    room: 'P.cs2:NDH4.4',
                    type: 'TH'
                },
                'MTH00044': {
                    name: 'Xác suất thống kê',
                    room: 'P.cs2:E207',
                    type: 'LT'
                },
                'MTH00044_TH': {
                    name: 'Xác suất thống kê',
                    room: 'P.cs2:NDH4.3',
                    type: 'TH'
                }
            },

  
            timetable: [
                // Tiết 1
                [null, null,'BAA0022:3', null, null, 'MTH00022:3', null],
                // Tiết 2  
                [null, null, null, null, null, null, null],
                // Tiết 3
                [null, null, null, 'EDT10001:3', null, null, null],
                // Tiết 4
                [null, null, null, null, null, null, null],
                // Tiết 5
                [null, null, null, null, null, null, null],
                // Tiết 6
                ['EDT10008:3', null, 'MTH00022:4', 'MTH00044:4', 'EDT10008_TH:3', 'BAA00103:4', null],
                // Tiết 7
                [null, null, null, null, null, null, null],
                // Tiết 8
                [null, null, null, null, null, null, null],
                // Tiết 9
                [null, null, null, null, 'MTH00044_TH:2', null, null],
                // Tiết 10
                [null, null, null, null, null, null, null]
            ]
        };


        function renderTimetable() {
            const container = document.getElementById('timetable');
            const days = ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'CN'];
            
        
            container.innerHTML = '<div class="header-cell"><span>Tiết</span></div>';
            days.forEach(day => {
                container.innerHTML += `<div class="header-cell"><span>${day}</span></div>`;
            });

            
            const skipCells = new Set();

     
            for (let period = 0; period < 10; period++) {
           
                container.innerHTML += `<div class="time-cell">${period + 1}</div>`;

        
                for (let day = 0; day < 7; day++) {
                    const cellKey = `${period}-${day}`;
                    
                    if (skipCells.has(cellKey)) {
                        continue;
                    }

                    const cellData = SCHEDULE_DATA.timetable[period][day];
                    
                    if (!cellData) {
                        container.innerHTML += '<div class="cell-empty"></div>';
                    } else {
                       
                        const [subjectCode, span = 1] = cellData.split(':');
                        const subject = SCHEDULE_DATA.subjects[subjectCode];
                        const spanCount = parseInt(span);

              
                        for (let i = 1; i < spanCount; i++) {
                            skipCells.add(`${period + i}-${day}`);
                        }

                
                        const cellHTML = `
                            <div class="subject-cell" style="grid-row: span ${spanCount}">
                                <span class="subject-type type-${subject.type}">${subject.type}</span>
                                <div class="subject-code">${subjectCode.replace('_TH', '')}</div>
                                <div class="subject-name">${subject.name}</div>
                                <div class="subject-room">${subject.room}</div>
                            </div>
                        `;
                        container.innerHTML += cellHTML;
                    }
                }
            }

     
            document.querySelectorAll('.subject-cell').forEach((cell, index) => {
                cell.style.animation = `popIn 0.6s ease-out ${index * 0.05}s both`;
            });
        }

        // ==========================================
        // MATRIX RAIN EFFECT
        // ==========================================
        
        const matrixCanvas = document.getElementById('matrix-canvas');
        const matrixCtx = matrixCanvas.getContext('2d');

        matrixCanvas.width = window.innerWidth;
        matrixCanvas.height = window.innerHeight;

        const matrixChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        const fontSize = 14;
        const columns = matrixCanvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            matrixCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            
            matrixCtx.fillStyle = '#0f0';
            matrixCtx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars.charAt(Math.floor(Math.random() * matrixChars.length));
                matrixCtx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 33);

        // ==========================================
        // PARTICLE CONNECTION EFFECT
        // ==========================================
        
        const particleCanvas = document.getElementById('particle-canvas');
        const particleCtx = particleCanvas.getContext('2d');

        particleCanvas.width = window.innerWidth;
        particleCanvas.height = window.innerHeight;

        class Particle {
            constructor() {
                this.x = Math.random() * particleCanvas.width;
                this.y = Math.random() * particleCanvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > particleCanvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > particleCanvas.height) this.vy *= -1;
            }

            draw() {
                particleCtx.beginPath();
                particleCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                particleCtx.fillStyle = '#0ff';
                particleCtx.shadowBlur = 10;
                particleCtx.shadowColor = '#0ff';
                particleCtx.fill();
            }
        }

        const particles = Array(50).fill().map(() => new Particle());

        function drawParticles() {
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            
        
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });


            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        particleCtx.beginPath();
                        particleCtx.strokeStyle = `rgba(0, 255, 255, ${1 - distance / 150})`;
                        particleCtx.lineWidth = 1;
                        particleCtx.moveTo(particles[i].x, particles[i].y);
                        particleCtx.lineTo(particles[j].x, particles[j].y);
                        particleCtx.stroke();
                    }
                }
            }

            requestAnimationFrame(drawParticles);
        }

        drawParticles();

        // ==========================================
        // MOUSE INTERACTION WITH PARTICLES
        // ==========================================
        
        let mouse = { x: null, y: null };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;

            particles.forEach(particle => {
                const dx = mouse.x - particle.x;
                const dy = mouse.y - particle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 100) {
                    particle.vx -= dx / distance * 0.05;
                    particle.vy -= dy / distance * 0.05;
                }
            });
        });

        // ==========================================
        // GLITCH EFFECT ON HOVER
        // ==========================================
        
        document.addEventListener('DOMContentLoaded', () => {
            renderTimetable();

            document.querySelectorAll('.subject-cell').forEach(cell => {
                cell.addEventListener('mouseenter', function() {
                    this.style.animation = 'none';
                    setTimeout(() => {
                        this.style.animation = '';
                    }, 10);
                });
            });
        });

       
        window.addEventListener('resize', () => {
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
